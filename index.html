<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto 8 EM 12 – Dionatan Alves</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;0,900;1,300&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6A00;
    --orange-dark: #CC5200;
    --orange-glow: rgba(255, 106, 0, 0.25);
    --black: #0D0D0D;
    --graphite: #111111;
    --white: #FFFFFF;
    --radius-lg: 24px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'Barlow', sans-serif; overflow-x: hidden; }

  /* EFEITO DE RUÍDO QUE VOCÊ TINHA */
  .grain-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

  /* HEADER / NAV */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    background: rgba(13, 13, 13, 0.8); backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255, 106, 0, 0.2); padding: 20px 0;
  }
  .nav-flex { display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: 'Bebas Neue'; font-size: 2rem; color: white; text-decoration: none; }
  .logo span { color: var(--orange); }

  /* HERO */
  .hero { padding: 180px 0 80px; text-align: center; }
  .hero h1 { font-family: 'Bebas Neue'; font-size: clamp(3.5rem, 10vw, 7rem); line-height: 0.9; }
  .hero h1 span { color: var(--orange); }
  .hero-img { width: 100%; max-width: 700px; border-radius: 24px; border: 1px solid var(--orange); margin: 40px auto; display: block; }

  /* NOVA GRADE DE AUTORIDADE */
  .authority-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin: 60px 0; }
  .auth-item { height: 350px; border-radius: 16px; overflow: hidden; border: 1px solid #333; }
  .auth-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; filter: grayscale(1); }
  .auth-item:hover img { filter: grayscale(0); transform: scale(1.05); }

  /* CALCULADORA (SEU ESTILO ORIGINAL DE VOLTA) */
  .calc-section { padding: 100px 0; background: #0a0a0a; border-radius: 50px 50px 0 0; }
  .calc-card { background: var(--graphite); padding: 40px; border-radius: var(--radius-lg); border: 1px solid var(--orange-glow); max-width: 600px; margin: 0 auto; }
  .step-content { display: none; }
  .step-content.active { display: block; }
  
  input[type="number"], input[type="text"], input[type="email"], select {
    width: 100%; padding: 18px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 12px; font-size: 1rem;
  }

  .btn-next { background: var(--orange); color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1.1rem; margin-top: 20px; transition: 0.3s; }
  .btn-next:hover { background: var(--orange-dark); box-shadow: 0 0 20px var(--orange-glow); }

  /* GRADE DE RESULTADOS */
  .results-section { padding: 80px 0; }
  .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  .results-grid img { width: 100%; border-radius: 16px; border: 1px solid #222; }

  /* MODAL */
  #calc-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;
  }
  .modal-content { background: var(--graphite); padding: 40px; border-radius: 24px; max-width: 500px; width: 100%; text-align: center; border: 1px solid var(--orange); }
</style>
</head>
<body>
<div class="grain-overlay"></div>

<nav>
  <div class="container nav-flex">
    <a href="#" class="logo">PROJETO <span>8 EM 12</span></a>
    <a href="#calculadora" style="color: white; text-decoration: none; font-weight: bold; border: 1px solid var(--orange); padding: 10px 20px; border-radius: 8px;">CALCULAR AGORA</a>
  </div>
</nav>

<section class="hero container">
  <h1>TRANSFORME SEU <br><span>FÍSICO</span> EM 12 SEMANAS</h1>
  <img src="assets/dramatica1.webp" class="hero-img" alt="Dionatan Alves">
</section>

<div class="container authority-grid">
  <div class="auth-item"><img src="assets/treinandoramondino.webp"></div>
  <div class="auth-item"><img src="assets/premio1.webp"></div>
  <div class="auth-item"><img src="assets/intenso1.webp"></div>
  <div class="auth-item"><img src="assets/professor1.webp"></div>
</div>

<section id="resultados" class="results-section container">
  <h2 style="font-family: 'Bebas Neue'; font-size: 3rem; margin-bottom: 40px; color: var(--orange);">RESULTADOS REAIS</h2>
  <div class="results-grid">
    <img src="assets/antesedepois1.webp">
    <img src="assets/antesedepois.2.webp">
    <img src="assets/antesedepois.3.webp">
    <img src="assets/antesedepois.4.webp">
  </div>
</section>

<section id="calculadora" class="calc-section">
  <div class="container">
    <div class="calc-card">
      <h2 style="font-family: 'Bebas Neue'; font-size: 2.5rem; margin-bottom: 30px; text-align: center;">CALCULADORA DE POTENCIAL</h2>
      
      <div id="step1" class="step-content active">
        <p style="margin-bottom: 15px;">Qual seu objetivo principal?</p>
        <select id="objetivo">
          <option value="definicao">Máxima Definição</option>
          <option value="massa">Ganho de Massa Magra</option>
          <option value="recomposicao">Recomposição Corporal</option>
        </select>
        <button class="btn-next" onclick="goToStep(2)">PRÓXIMO PASSO</button>
      </div>

      <div id="step2" class="step-content">
        <input type="number" id="peso" placeholder="Seu Peso atual (kg)">
        <input type="number" id="altura" placeholder="Sua Altura (cm)">
        <input type="number" id="idade" placeholder="Sua Idade">
        <button class="btn-next" onclick="finalizarCalculo()">VER MEU POTENCIAL</button>
        <p onclick="goToStep(1)" style="text-align: center; margin-top: 15px; cursor: pointer; color: #666;">Voltar</p>
      </div>
    </div>
  </div>
</section>

<div id="calc-modal">
  <div class="modal-content">
    <h3 style="font-family: 'Bebas Neue'; font-size: 2rem; color: var(--orange);">RESULTADO PRONTO!</h3>
    <p style="margin: 15px 0;">Para onde enviamos seu plano detalhado e os resultados calculados?</p>
    <form onsubmit="enviarWhatsApp(event)">
      <input type="text" id="nome" placeholder="Seu Nome" required>
      <input type="text" id="whatsapp" placeholder="Seu WhatsApp (com DDD)" required>
      <button type="submit" class="btn-next">REVER RESULTADOS NO WHATSAPP</button>
    </form>
  </div>
</div>

<script>
  let dadosCalculados = {};

  function goToStep(step) {
    document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + step).classList.add('active');
  }

  function finalizarCalculo() {
    const peso = document.getElementById('peso').value;
    const altura = document.getElementById('altura').value;
    const objetivo = document.getElementById('objetivo').value;
    
    if(!peso || !altura) return alert("Preencha todos os campos!");
    
    dadosCalculados = { peso, altura, objetivo };
    document.getElementById('calc-modal').style.display = 'flex';
  }

  function enviarWhatsApp(e) {
    e.preventDefault();
    const nome = document.getElementById('nome').value;
    const fone = document.getElementById('whatsapp').value;
    
    const texto = `Olá Dionatan! Meu nome é ${nome}. Acabei de calcular meu potencial no site.%0A%0A` +
                  `📊 *Dados:*%0A` +
                  `- Peso: ${dadosCalculados.peso}kg%0A` +
                  `- Altura: ${dadosCalculados.altura}cm%0A` +
                  `- Objetivo: ${dadosCalculados.objetivo}%0A%0A` +
                  `Quero meu plano do Projeto 8 em 12!`;

    window.open(`https://wa.me/5548991316526?text=${texto}`, '_blank');
  }
</script>
</body>
</html>
