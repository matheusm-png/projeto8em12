<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto 8 EM 12 – Dionatan Alves</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain-overlay"></div>

    <nav>
        <div class="container nav-container">
            <div class="logo">PROJETO <span>8 EM 12</span></div>
            <a href="#calculadora" class="btn-nav">COMEÇAR AGORA</a>
        </div>
    </nav>

    <section class="hero">
        <div class="container hero-grid">
            <div class="hero-text">
                <h1 class="bebas">CONSTRUA UM <br><span class="orange">CORPO ESTÉTICO</span></h1>
                <p>O método de 12 semanas para quem busca máxima definição e performance.</p>
                <a href="#calculadora" class="btn-main">CALCULAR MEU PLANO</a>
            </div>
            <div class="hero-img">
                <img src="assets/dramatica1.webp" alt="Dionatan Alves">
            </div>
        </div>
    </section>

    <section class="lifestyle-grid container">
        <div class="card-img"><img src="assets/treinandoramondino.webp" alt="Treino Ramon Dino"></div>
        <div class="card-img"><img src="assets/premio1.webp" alt="Premiação"></div>
        <div class="card-img"><img src="assets/intenso1.webp" alt="Treino Intenso"></div>
        <div class="card-img"><img src="assets/professor1.webp" alt="Consultoria"></div>
    </section>

    <section id="resultados" class="results-section">
        <div class="container">
            <h2 class="bebas section-title">RESULTADOS <span class="orange">REAIS</span></h2>
            <div class="results-grid">
                <div class="result-card"><img src="assets/antesedepois1.webp" loading="lazy"></div>
                <div class="result-card"><img src="assets/antesedepois.2.webp" loading="lazy"></div>
                <div class="result-card"><img src="assets/antesedepois.3.webp" loading="lazy"></div>
                <div class="result-card"><img src="assets/antesedepois.4.webp" loading="lazy"></div>
            </div>
        </div>
    </section>

    <section id="calculadora" class="container">
        </section>

    <script src="script.js"></script>
</body>
</html>
